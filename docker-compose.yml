services:
  db:
    image: postgres:16
    container_name: kwhab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kwhab
      POSTGRES_PASSWORD: kwhab
      POSTGRES_DB: kwhab
    ports:
      # host 5433 -> container 5432 (5433 avoids clashing with a native local pg)
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      # Auto-run on FIRST boot of an empty volume, in filename order:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kwhab -d kwhab"]
      interval: 3s
      timeout: 3s
      retries: 10
